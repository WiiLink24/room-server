{% macro language_dropdown(locales) %}
    <div class="flex flex-col items-end gap-2">
        <label class="flex flex-row items-center justify-end gap-2 opacity-60" for="language"><img src="/static/icon/globe.svg" alt="Language" class="h-4 w-4 mr-2 invert" /> Language</label>
        <select name="language" id="language" onchange="localStorage.setItem('language', this.value)" class="bg-slate-900 rounded-xl text-slate-100 px-3 py-2 border border-slate-800">
            {% for locale, name in locales %}
                <option value="{{ locale.name }}" {% if locale.name == current_language %}selected{% endif %}>
                    {{ name }}
                </option>
            {% endfor %}
        </select>
    </div>
{% endmacro %}
