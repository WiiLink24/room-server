{% macro language_dropdown(locales) %}
    <div class="flex flex-col items-end gap-2">
        <label class="flex flex-row items-center justify-end gap-2 opacity-60 text-white pl-10" for="language"><img src="/static/icon/globe.svg" alt="Language" class="h-4 w-4 mr-2 invert" />Language</label>
        <select name="language" id="language" onchange="setLocale()" class="bg-slate-900 rounded-xl text-slate-100 px-3 py-2 border border-slate-800">
            {% for _, value in locales %}
                <option value="{{ value }}" {% if value == g.current_locale.value %}selected{% endif %}>
                    {{ value }}
                </option>
            {% endfor %}
        </select>
    </div>

    <script>
        function setLocale() {
            const locale = document.getElementById("language").value;
            localStorage.setItem('language', locale);
            const url = new URL(window.location.href);
            url.searchParams.set('l', locale);
            window.location.href = url.toString();
        }
    </script>
{% endmacro %}
